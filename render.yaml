services:
  - type: web
    name: swifly-server-registry
    env: node
    rootDir: swifly-server
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HEARTBEAT_TTL_SECONDS
        value: "180"
      - key: ADMIN_API_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: swifly-server-db
          property: connectionString

databases:
  - name: swifly-server-db
    plan: free
